[pytest]
markers =
    slow: marks tests as slow (deselect with '-m "not slow"')
    integration: marks integration tests that require the full pipeline
    api: marks tests that require a running API server
    functional: marks functional system tests
    nonfunctional: marks non-functional system tests
    performance: marks performance tests
    reliability: marks reliability tests
    dataquality: marks data quality tests
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
